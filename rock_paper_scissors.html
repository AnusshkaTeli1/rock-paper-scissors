<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ══════════════════════════════════
       GAME OVER OVERLAY
    ══════════════════════════════════ */
    #gameOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(10, 8, 30, 0.92);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease;
    }

    #gameOverlay.show { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .overlay-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 44px 50px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(60px) scale(0.9); opacity: 0; }
      to   { transform: translateY(0)    scale(1);   opacity: 1; }
    }

    .overlay-trophy { font-size: 4.5rem; margin-bottom: 10px; }

    .overlay-title {
      font-family: 'Boogaloo', cursive;
      font-size: 2.6rem;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .overlay-title.you-win { color: #56d8ff; text-shadow: 0 0 30px rgba(86,216,255,0.6); }
    .overlay-title.cpu-win { color: #ff6b6b; text-shadow: 0 0 30px rgba(255,107,107,0.6); }

    .overlay-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    /* Final score inside overlay */
    .final-scores {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .final-box {
      background: rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 12px 22px;
      min-width: 90px;
    }

    .final-box .f-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 4px;
    }

    .final-box .f-value {
      font-family: 'Boogaloo', cursive;
      font-size: 2rem;
      line-height: 1;
    }

    .final-box.you .f-value { color: #56d8ff; }
    .final-box.tie .f-value { color: #ffd200; }
    .final-box.cpu .f-value { color: #ff6b6b; }

    .play-again-btn {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      border: none;
      color: #1a1a2e;
      padding: 14px 42px;
      border-radius: 30px;
      font-family: 'Boogaloo', cursive;
      font-size: 1.3rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 24px rgba(255,210,0,0.35);
    }

    .play-again-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 32px rgba(255,210,0,0.55);
    }

    /* Confetti particle */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 99;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(100vh)  rotate(720deg); opacity: 0; }
    }

    /* ══════════════════════════════════
       MAIN GAME
    ══════════════════════════════════ */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      letter-spacing: 2px;
      background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      margin-bottom: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 0% }
      100% { background-position: 200% }
    }

    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* First-to-10 badge */
    .goal-badge {
      display: inline-block;
      background: rgba(255,210,0,0.12);
      border: 1px solid rgba(255,210,0,0.3);
      border-radius: 20px;
      padding: 4px 16px;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffd200;
      margin-bottom: 18px;
    }

    /* ── PROGRESS BARS ── */
    .progress-section {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 0 4px;
    }

    .prog-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      width: 30px;
      flex-shrink: 0;
    }

    .prog-label.you { color: #56d8ff; text-align: right; }
    .prog-label.cpu { color: #ff6b6b; text-align: left;  }

    .prog-track {
      flex: 1;
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .prog-fill-you {
      height: 100%;
      background: linear-gradient(90deg, #56d8ff, #1a9ecf);
      border-radius: 999px;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .prog-fill-cpu {
      height: 100%;
      background: linear-gradient(90deg, #ff6b6b, #c0392b);
      border-radius: 999px;
      width: 0%;
      float: right;
      transition: width 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    /* ── COUNTDOWN RING ── */
    .countdown-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 14px;
      min-height: 86px;
      justify-content: center;
    }

    .countdown-ring {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .countdown-ring svg {
      transform: rotate(-90deg);
      width: 72px;
      height: 72px;
    }

    .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.1);
      stroke-width: 5;
    }

    .ring-progress {
      fill: none;
      stroke: #ffd200;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 201;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }

    .ring-progress.urgent { stroke: #ff6b6b; }

    .countdown-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Boogaloo', cursive;
      font-size: 1.9rem;
      color: #ffd200;
      transition: color 0.3s;
    }

    .countdown-number.urgent { color: #ff6b6b; }

    .countdown-label {
      margin-top: 5px;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .countdown-wrap.hidden { visibility: hidden; }

    /* ── SCOREBOARD ── */
    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .score-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 10px 20px;
      min-width: 100px;
    }

    .score-box .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 3px;
    }

    .score-box .value {
      font-family: 'Boogaloo', cursive;
      font-size: 2.2rem;
      line-height: 1;
    }

    .score-box.you .value  { color: #56d8ff; }
    .score-box.tie .value  { color: #ffd200; }
    .score-box.cpu .value  { color: #ff6b6b; }

    /* Score pulse when point scored */
    .score-box.pulse .value {
      animation: scorePulse 0.5s ease;
    }

    @keyframes scorePulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    /* ── ARENA ── */
    .arena {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
      min-height: 114px;
    }

    .player-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      width: 114px;
    }

    .player-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.45);
    }

    .choice-display {
      width: 82px;
      height: 82px;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.7rem;
    }

    .choice-display.animate {
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    .choice-display.shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .vs {
      font-family: 'Boogaloo', cursive;
      font-size: 1.7rem;
      color: rgba(255,255,255,0.22);
    }

    /* ── RESULT ── */
    .result-banner {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .result-text {
      font-family: 'Boogaloo', cursive;
      font-size: 1.7rem;
      letter-spacing: 1px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease;
    }

    .result-text.show  { opacity: 1; transform: translateY(0); }
    .result-text.win   { color: #56d8ff; text-shadow: 0 0 20px rgba(86,216,255,0.5); }
    .result-text.lose  { color: #ff6b6b; text-shadow: 0 0 20px rgba(255,107,107,0.5); }
    .result-text.tie   { color: #ffd200; text-shadow: 0 0 20px rgba(255,210,0,0.4); }
    .result-text.info  { color: rgba(255,255,255,0.55); }

    /* ── BUTTONS ── */
    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 26px;
    }

    .choice-btn {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      cursor: pointer;
      font-size: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      position: relative;
      overflow: visible;
    }

    .choice-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .choice-btn:not(:disabled):hover {
      transform: translateY(-6px) scale(1.08);
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.14);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }

    .choice-btn:not(:disabled):hover::after { opacity: 1; }
    .choice-btn:not(:disabled):active { transform: scale(0.96); }

    .choice-btn:disabled {
      opacity: 0.32;
      cursor: not-allowed;
      filter: grayscale(60%);
    }

    .choice-btn.selected {
      border-color: #ffd200 !important;
      background: rgba(255,210,0,0.15) !important;
      box-shadow: 0 0 20px rgba(255,210,0,0.35) !important;
      opacity: 1 !important;
      filter: none !important;
    }

    .btn-label {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
    }

    /* ── CONTROLS ── */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .start-btn {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      border: none;
      color: #1a1a2e;
      padding: 10px 32px;
      border-radius: 30px;
      font-family: 'Boogaloo', cursive;
      font-size: 1.1rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(255,210,0,0.3);
    }

    .start-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(255,210,0,0.5);
    }

    .start-btn:active:not(:disabled) { transform: scale(0.97); }
    .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .reset-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
      padding: 10px 22px;
      border-radius: 30px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background: rgba(255,255,255,0.08);
      color: white;
      border-color: rgba(255,255,255,0.4);
    }

    .rules {
      margin-top: 20px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.22);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!-- ══ GAME OVER OVERLAY ══ -->
<div id="gameOverlay">
  <div class="overlay-card">
    <div class="overlay-trophy" id="overlayTrophy">🏆</div>
    <div class="overlay-title" id="overlayTitle">You Win!</div>
    <div class="overlay-sub" id="overlaySub">First to 10 wins — Champion!</div>
    <div class="final-scores">
      <div class="final-box you"><div class="f-label">You</div><div class="f-value" id="finalYou">0</div></div>
      <div class="final-box tie"><div class="f-label">Ties</div><div class="f-value" id="finalTie">0</div></div>
      <div class="final-box cpu"><div class="f-label">CPU</div><div class="f-value" id="finalCPU">0</div></div>
    </div>
    <button class="play-again-btn" onclick="playAgain()">🔄 Play Again</button>
  </div>
</div>

<!-- ══ MAIN GAME ══ -->
<div class="container">
  <h1>Rock Paper Scissors</h1>
  <p class="subtitle">First to 10 wins the match</p>
  <div class="goal-badge">🏆 First to 10 wins</div>

  <!-- Win Progress Bars -->
  <div class="progress-section">
    <span class="prog-label you">YOU</span>
    <div class="prog-track"><div class="prog-fill-you" id="progYou"></div></div>
    <span style="font-family:'Boogaloo',cursive;font-size:0.75rem;color:rgba(255,255,255,0.3)">VS</span>
    <div class="prog-track"><div class="prog-fill-cpu" id="progCPU"></div></div>
    <span class="prog-label cpu">CPU</span>
  </div>

  <!-- Countdown Ring -->
  <div class="countdown-wrap hidden" id="countdownWrap">
    <div class="countdown-ring">
      <svg viewBox="0 0 76 76">
        <circle class="ring-bg"       cx="38" cy="38" r="32"/>
        <circle class="ring-progress" cx="38" cy="38" r="32" id="ringProgress"/>
      </svg>
      <div class="countdown-number" id="countdownNumber">3</div>
    </div>
    <div class="countdown-label">seconds to choose!</div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-box you" id="boxYou"><div class="label">You</div><div class="value" id="scoreYou">0</div></div>
    <div class="score-box tie"            ><div class="label">Ties</div><div class="value" id="scoreTie">0</div></div>
    <div class="score-box cpu" id="boxCPU"><div class="label">CPU</div><div class="value" id="scoreCPU">0</div></div>
  </div>

  <!-- Arena -->
  <div class="arena">
    <div class="player-side">
      <div class="player-label">You</div>
      <div class="choice-display" id="playerDisplay">❓</div>
    </div>
    <div class="vs">VS</div>
    <div class="player-side">
      <div class="player-label">CPU</div>
      <div class="choice-display" id="cpuDisplay">❓</div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-banner">
    <div class="result-text info show" id="resultText">Press START to begin the match!</div>
  </div>

  <!-- Choice Buttons -->
  <div class="buttons">
    <button class="choice-btn" id="btnRock"     onclick="selectChoice('rock')"     disabled>🪨<span class="btn-label">Rock</span></button>
    <button class="choice-btn" id="btnPaper"    onclick="selectChoice('paper')"    disabled>📄<span class="btn-label">Paper</span></button>
    <button class="choice-btn" id="btnScissors" onclick="selectChoice('scissors')" disabled>✂️<span class="btn-label">Scissors</span></button>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <button class="start-btn" id="startBtn" onclick="startRound()">▶ START</button>
    <button class="reset-btn" onclick="resetGame()">↺ New Match</button>
  </div>

  <p class="rules">Rock crushes Scissors &nbsp;·&nbsp; Scissors cuts Paper &nbsp;·&nbsp; Paper covers Rock</p>
</div>

<script>
  /* ── Constants ── */
  const WIN_TARGET     = 10;
  const COUNTDOWN_FROM = 3;
  const CIRCUMFERENCE  = 2 * Math.PI * 32;

  const choices = ['rock', 'paper', 'scissors'];
  const emojis  = { rock: '🪨', paper: '📄', scissors: '✂️' };
  const btnIds  = { rock: 'btnRock', paper: 'btnPaper', scissors: 'btnScissors' };

  /* ── State ── */
  let scoreYou = 0, scoreCPU = 0, scoreTie = 0;
  let countdownInterval = null;
  let timeLeft          = COUNTDOWN_FROM;
  let pendingChoice     = null;
  let roundActive       = false;
  let gameOver          = false;

  /* ── DOM ── */
  const wrap       = document.getElementById('countdownWrap');
  const ringProg   = document.getElementById('ringProgress');
  const numEl      = document.getElementById('countdownNumber');
  const resultEl   = document.getElementById('resultText');
  const startBtn   = document.getElementById('startBtn');
  const playerDisp = document.getElementById('playerDisplay');
  const cpuDisp    = document.getElementById('cpuDisplay');
  const allBtns    = document.querySelectorAll('.choice-btn');
  const overlay    = document.getElementById('gameOverlay');

  /* ── Ring ── */
  function setRing(sec) {
    ringProg.style.strokeDashoffset = CIRCUMFERENCE * (1 - sec / COUNTDOWN_FROM);
    const u = sec <= 1;
    ringProg.classList.toggle('urgent', u);
    numEl.classList.toggle('urgent', u);
    numEl.textContent = sec;
  }

  /* ── Progress bars ── */
  function updateBars() {
    document.getElementById('progYou').style.width = (scoreYou / WIN_TARGET * 100) + '%';
    document.getElementById('progCPU').style.width = (scoreCPU / WIN_TARGET * 100) + '%';
  }

  /* ── Score pulse ── */
  function pulseBox(id) {
    const box = document.getElementById(id);
    box.classList.remove('pulse');
    void box.offsetWidth;
    box.classList.add('pulse');
    setTimeout(() => box.classList.remove('pulse'), 600);
  }

  /* ── Start round ── */
  function startRound() {
    if (roundActive || gameOver) return;
    roundActive   = true;
    pendingChoice = null;
    timeLeft      = COUNTDOWN_FROM;

    playerDisp.textContent = '❓';
    cpuDisp.textContent    = '❓';
    playerDisp.classList.remove('animate','shake');
    cpuDisp.classList.remove('animate','shake');
    allBtns.forEach(b => b.classList.remove('selected'));

    wrap.classList.remove('hidden');
    setRing(timeLeft);
    allBtns.forEach(b => b.disabled = false);
    startBtn.disabled = true;

    showResult('⏳ Pick before time runs out!', 'info');

    countdownInterval = setInterval(() => {
      timeLeft--;
      setRing(timeLeft);
      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        const finalChoice = pendingChoice || choices[Math.floor(Math.random() * 3)];
        if (!pendingChoice) {
          allBtns.forEach(b => {
            b.classList.remove('shake');
            void b.offsetWidth;
            b.classList.add('shake');
          });
        }
        resolveRound(finalChoice);
      }
    }, 1000);
  }

  /* ── User picks ── */
  function selectChoice(choice) {
    if (!roundActive || pendingChoice || gameOver) return;
    pendingChoice = choice;
    allBtns.forEach(b => b.disabled = true);
    document.getElementById(btnIds[choice]).classList.add('selected');
    document.getElementById(btnIds[choice]).disabled = false;
    showResult('✅ Locked in! Waiting for timer...', 'info');
  }

  /* ── Resolve round ── */
  function resolveRound(playerChoice) {
    roundActive = false;
    allBtns.forEach(b => { b.disabled = true; b.classList.remove('selected','shake'); });
    wrap.classList.add('hidden');

    const cpuChoice = choices[Math.floor(Math.random() * 3)];

    playerDisp.textContent = emojis[playerChoice];
    cpuDisp.textContent    = emojis[cpuChoice];
    playerDisp.classList.remove('animate'); void playerDisp.offsetWidth; playerDisp.classList.add('animate');
    cpuDisp.classList.remove('animate');    void cpuDisp.offsetWidth;    cpuDisp.classList.add('animate');

    const result = getResult(playerChoice, cpuChoice);

    if (result === 'win')  { scoreYou++; pulseBox('boxYou'); }
    if (result === 'lose') { scoreCPU++; pulseBox('boxCPU'); }
    if (result === 'tie')  { scoreTie++; }

    document.getElementById('scoreYou').textContent = scoreYou;
    document.getElementById('scoreCPU').textContent = scoreCPU;
    document.getElementById('scoreTie').textContent = scoreTie;
    updateBars();

    setTimeout(() => {
      if (result === 'win')  showResult('🎉 You Win this round!', 'win');
      if (result === 'lose') showResult('💀 CPU wins this round!', 'lose');
      if (result === 'tie')  showResult("🤝 It's a Tie!", 'tie');

      // Check match winner
      if (scoreYou >= WIN_TARGET || scoreCPU >= WIN_TARGET) {
        setTimeout(() => triggerGameOver(), 800);
      } else {
        startBtn.disabled = false;
      }
    }, 150);
  }

  /* ── Game Over ── */
  function triggerGameOver() {
    gameOver = true;
    clearInterval(countdownInterval);
    allBtns.forEach(b => b.disabled = true);
    startBtn.disabled = true;

    const youWon = scoreYou >= WIN_TARGET;

    document.getElementById('overlayTrophy').textContent = youWon ? '🏆' : '💀';
    document.getElementById('overlayTitle').textContent  = youWon ? '🎉 You Win the Match!' : '😔 CPU Wins the Match!';
    document.getElementById('overlayTitle').className    = 'overlay-title ' + (youWon ? 'you-win' : 'cpu-win');
    document.getElementById('overlaySub').textContent    = youWon
      ? `You reached ${WIN_TARGET} wins first — Champion!`
      : `CPU reached ${WIN_TARGET} wins first — Better luck next time!`;

    document.getElementById('finalYou').textContent = scoreYou;
    document.getElementById('finalTie').textContent = scoreTie;
    document.getElementById('finalCPU').textContent = scoreCPU;

    overlay.classList.add('show');

    // Confetti only if player wins
    if (youWon) launchConfetti();
  }

  /* ── Confetti ── */
  function launchConfetti() {
    const colors = ['#56d8ff','#ffd200','#ff6b6b','#56ffb8','#ff56c8','#fff'];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left     = Math.random() * 100 + 'vw';
        el.style.top      = '-20px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width    = (Math.random() * 8 + 6) + 'px';
        el.style.height   = (Math.random() * 8 + 6) + 'px';
        el.style.animationDuration = (Math.random() * 2 + 2) + 's';
        el.style.animationDelay   = '0s';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }, i * 40);
    }
  }

  /* ── Play Again (same as reset) ── */
  function playAgain() {
    overlay.classList.remove('show');
    resetGame();
  }

  /* ── Logic ── */
  function getResult(player, cpu) {
    if (player === cpu) return 'tie';
    if (
      (player === 'rock'     && cpu === 'scissors') ||
      (player === 'scissors' && cpu === 'paper')    ||
      (player === 'paper'    && cpu === 'rock')
    ) return 'win';
    return 'lose';
  }

  /* ── Show result ── */
  function showResult(msg, cls) {
    resultEl.classList.remove('show','win','lose','tie','info');
    setTimeout(() => {
      resultEl.textContent = msg;
      resultEl.className   = 'result-text ' + cls;
      resultEl.classList.add('show');
    }, 40);
  }

  /* ── Full reset ── */
  function resetGame() {
    clearInterval(countdownInterval);
    roundActive = false; pendingChoice = null; gameOver = false;
    scoreYou = scoreCPU = scoreTie = 0;
    ['scoreYou','scoreCPU','scoreTie'].forEach(id => document.getElementById(id).textContent = '0');
    updateBars();
    playerDisp.textContent = '❓';
    cpuDisp.textContent    = '❓';
    wrap.classList.add('hidden');
    allBtns.forEach(b => { b.disabled = true; b.classList.remove('selected','shake'); });
    startBtn.disabled = false;
    overlay.classList.remove('show');
    showResult('Press START to begin the match!', 'info');
  }
</script>
</body>
</html>
